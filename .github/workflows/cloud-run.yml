name: Build and Deploy Cloud Run Job

on:
  push:
    branches: [ master ]
    paths:
      - 'generate_apm_site.py'
      - 'aoe2_poller.py'
      - 'utils/**'
      - 'requirements.txt'
      - '.github/workflows/cloud-run.yml'
      - 'deploy_site.sh'
  pull_request:
    branches: [ master ]
    paths:
      - 'generate_apm_site.py'
      - 'aoe2_poller.py'
      - 'utils/**'
      - 'requirements.txt'
      - '.github/workflows/cloud-run.yml'
      - 'deploy_site.sh'

env:
  REGISTRY: us-east1-docker.pkg.dev
  PROJECT_ID: aoe2-site
  REPO: aoe2-repo
  IMAGE_NAME: us-east1-docker.pkg.dev/aoe2-site/aoe2-repo/aoe2-match-history

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Install beta component
        run: gcloud components install beta --quiet
      
      - name: Configure Docker
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet
      
      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --progress=plain \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
      
      - name: Deploy to Cloud Run
        run: |
          gcloud beta run jobs update aoe2-match-history-job \
            --image=${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=us-east1 \
            --memory=2Gi \
            --service-account=aoe2-site-bot@aoe2-site.iam.gserviceaccount.com \
            --quiet 

      - name: Update Cloud Scheduler
        run: |
          gcloud scheduler jobs update http aoe2-match-history-job-trigger \
            --schedule="*/15 * * * *" \
            --uri="https://us-east1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/aoe2-site/jobs/aoe2-match-history-job:run" \
            --http-method=POST \
            --oauth-service-account-email=aoe2-site-bot@aoe2-site.iam.gserviceaccount.com \
            --location=us-east1 