name: Deploy Match DB VM

on:
  push:
    branches: [ master ]
    paths:
      - 'aoe-match-db/**'
      - '.github/workflows/deploy-match-db.yml'
  workflow_dispatch:

jobs:
  deploy-match-db-vm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Update VM metadata and reset
        run: |
          cd aoe-match-db
          chmod +x deploy-vm.sh firewall.sh
          MATCH_DB_PASSWORD="${{ secrets.MATCH_DB_PASSWORD }}" ./deploy-vm.sh

      - name: Wait for PostgreSQL to be ready
        run: |
          echo "Waiting for PostgreSQL to become healthy..."
          for i in {1..30}; do
            if gcloud compute ssh aoe-match-db --zone=us-central1-a --command="sudo -u postgres pg_isready" 2>/dev/null; then
              echo "PostgreSQL is ready!"
              exit 0
            fi
            echo "Waiting... (attempt $i/30)"
            sleep 10
          done
          echo "PostgreSQL failed to become healthy after 5 minutes"
          exit 1

      - name: Verify disk health
        run: |
          gcloud compute ssh aoe-match-db --zone=us-central1-a --command="df -h / && sudo -u postgres psql -d aoe2_matches -c 'SELECT count(*) FROM match;'"
