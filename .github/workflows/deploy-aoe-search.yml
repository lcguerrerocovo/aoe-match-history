name: Deploy AOE Search VM with Latest Snapshot

on:
  push:
    paths:
      - 'aoe-search/deploy-vm.sh'
      - 'aoe-search/startup.sh'
      - '.github/workflows/deploy-aoe-search.yml'
  workflow_dispatch:

jobs:
  deploy-aoe-search-vm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Deploy AOE Search VM
        run: |
          cd aoe-search
          chmod +x deploy-vm.sh
          MEILI_MASTER_KEY="${{ secrets.MEILISEARCH_MASTER_KEY }}" ./deploy-vm.sh
      
      - name: Get VM External IP
        id: vm-ip
        run: |
          EXTERNAL_IP=$(gcloud compute instances describe aoe-search --zone=us-central1-a --format='get(networkInterfaces[0].accessConfigs[0].natIP)' 2>/dev/null || echo "")
          if [ -n "$EXTERNAL_IP" ]; then
            echo "vm_external_ip=$EXTERNAL_IP" >> $GITHUB_OUTPUT
            echo "✅ AOE Search VM deployed at: $EXTERNAL_IP"
          else
            echo "❌ Failed to get VM external IP"
            exit 1
          fi
      
      - name: Wait for startup script to complete
        run: |
          EXTERNAL_IP="${{ steps.vm-ip.outputs.vm_external_ip }}"
          echo "⏳ Waiting for startup script to complete..."
          for i in {1..60}; do
            if curl -f "http://$EXTERNAL_IP:7700/health" > /dev/null 2>&1; then
              echo "✅ Startup script completed - Meilisearch is ready!"
              break
            fi
            echo "Waiting for startup script... (attempt $i/60)"
            sleep 10
          done
      
      - name: Get latest snapshot from GCS
        id: get-snapshot
        run: |
          # Get the latest snapshot directory
          LATEST_SNAPSHOT_DIR=$(gsutil ls gs://aoe2-site-data/snapshots/ | grep -E '[0-9]{8}-[0-9]{6}/$' | sort | tail -1 | sed 's|/$||')
          echo "Latest snapshot: $LATEST_SNAPSHOT_DIR"
          
          # Download the snapshot files to GitHub Actions runner
          mkdir -p ./latest-snapshot
          gsutil cp "${LATEST_SNAPSHOT_DIR}/data.snapshot" ./latest-snapshot/
          gsutil cp "${LATEST_SNAPSHOT_DIR}/fingerprint.txt" ./latest-snapshot/ 2>/dev/null || echo "No fingerprint found"
          gsutil cp "${LATEST_SNAPSHOT_DIR}/metadata.json" ./latest-snapshot/ 2>/dev/null || echo "No metadata found"
          
          # Set output for next steps
          echo "snapshot_dir=${LATEST_SNAPSHOT_DIR}" >> $GITHUB_OUTPUT
          echo "fingerprint=$(cat ./latest-snapshot/fingerprint.txt 2>/dev/null || echo 'none')" >> $GITHUB_OUTPUT
      

      
      - name: Upload snapshot and restart Meilisearch
        run: |
          EXTERNAL_IP="${{ steps.vm-ip.outputs.vm_external_ip }}"
          
          # Create snapshot directory on VM
          gcloud compute ssh aoe-search --zone=us-central1-a --command="sudo mkdir -p /var/lib/meilisearch/data/snapshots"
          
          # Upload snapshot files using gcloud compute scp
          gcloud compute scp --zone=us-central1-a ./latest-snapshot/* aoe-search:/tmp/
          
          # Move files to Meilisearch data directory
          gcloud compute ssh aoe-search --zone=us-central1-a --command="
            sudo mv /tmp/data.snapshot /var/lib/meilisearch/data/snapshots/latest.snapshot
            sudo mv /tmp/fingerprint.txt /var/lib/meilisearch/data/snapshots/latest.fingerprint.txt 2>/dev/null || true
            sudo mv /tmp/metadata.json /var/lib/meilisearch/data/snapshots/latest.metadata.json 2>/dev/null || true
            sudo chown -R root:root /var/lib/meilisearch/data/snapshots/
            sudo chmod 644 /var/lib/meilisearch/data/snapshots/*
          "
          
          # Restart container with startup script logic
          echo "🔄 Restarting Meilisearch container to load new snapshot..."
          gcloud compute ssh aoe-search --zone=us-central1-a --command="
            # Stop and remove container completely to trigger fresh startup logic
            sudo docker stop meilisearch 2>/dev/null || true
            sudo docker rm meilisearch 2>/dev/null || true
            
            # Get master key from metadata
            MASTER_KEY=\$(curl -H 'Metadata-Flavor: Google' http://metadata.google.internal/computeMetadata/v1/instance/attributes/meili_master_key)
            
            # Use the same startup script logic to detect and import snapshot
            if [ -f '/var/lib/meilisearch/data/snapshots/latest.snapshot' ]; then
                echo 'Found snapshot, starting with import'
                sudo rm -rf /var/lib/meilisearch/data/data.ms
                sudo docker run -d \\
                  --name meilisearch \\
                  --restart unless-stopped \\
                  -p 7700:7700 \\
                  -e MEILI_ENV=production \\
                  -e MEILI_MASTER_KEY=\$MASTER_KEY \\
                  -v /var/lib/meilisearch/data:/meili_data \\
                  getmeili/meilisearch:v1.7 \\
                  meilisearch --import-snapshot /meili_data/snapshots/latest.snapshot
            else
                echo 'No snapshot found, starting normally'
                sudo docker run -d \\
                  --name meilisearch \\
                  --restart unless-stopped \\
                  -p 7700:7700 \\
                  -e MEILI_ENV=production \\
                  -e MEILI_MASTER_KEY=\$MASTER_KEY \\
                  -v /var/lib/meilisearch/data:/meili_data \\
                  getmeili/meilisearch:v1.7
            fi
          "
          
          echo "⏳ Waiting for Meilisearch to start with new snapshot..."
          sleep 10
          
          # Apply index configuration (snapshots don't include settings)
          echo "📝 Applying index configuration after snapshot import..."
          gcloud compute ssh aoe-search --zone=us-central1-a --command="
            # Get master key from metadata
            MASTER_KEY=\$(curl -H 'Metadata-Flavor: Google' http://metadata.google.internal/computeMetadata/v1/instance/attributes/meili_master_key)
            
            # Fetch and apply configuration (same as startup script logic)
            curl 'http://metadata.google.internal/computeMetadata/v1/instance/attributes/meili_config' -H 'Metadata-Flavor: Google' > /tmp/index_config.json
            jq 'del(.uid, .primaryKey)' /tmp/index_config.json > /tmp/settings_config.json
            
            # Wait for Meilisearch to be ready
            until curl -f http://localhost:7700/health >/dev/null 2>&1; do
              echo 'Waiting for Meilisearch to be ready...'
              sleep 3
            done
            
            # Apply settings
            curl -X PATCH 'http://localhost:7700/indexes/players/settings' \
              -H \"Authorization: Bearer \$MASTER_KEY\" \
              -H 'Content-Type: application/json' \
              --data-binary @/tmp/settings_config.json
              
            echo '✅ Index configuration applied'
          "
      
      - name: Verify deployment
        run: |
          echo "⏳ Waiting for Meilisearch to be ready..."
          gcloud compute ssh aoe-search --zone=us-central1-a --command="
            # Wait for container to be running and healthy
            for i in {1..30}; do
              if sudo docker ps | grep -q meilisearch && curl -f http://localhost:7700/health >/dev/null 2>&1; then
                echo '✅ Meilisearch is running and healthy'
                break
              fi
              echo \"Waiting for Meilisearch... (attempt \$i/30)\"
              sleep 5
            done
            
            # Check if Meilisearch is running
            if sudo docker ps | grep -q meilisearch; then
              echo '✅ Meilisearch container is running'
              
              # Check if snapshot was loaded
              if [ -f '/var/lib/meilisearch/data/snapshots/latest.fingerprint.txt' ]; then
                CURRENT_FINGERPRINT=\$(cat /var/lib/meilisearch/data/snapshots/latest.fingerprint.txt)
                echo \"✅ Snapshot loaded with fingerprint: \$CURRENT_FINGERPRINT\"
              else
                echo '⚠️ No fingerprint file found'
              fi
              
              # Get document count
              DOC_COUNT=\$(curl -s -H \"Authorization: Bearer ${{ secrets.MEILISEARCH_MASTER_KEY }}\" http://localhost:7700/indexes/players/stats | jq -r '.numberOfDocuments // 0')
              echo \"📊 Index contains \$DOC_COUNT documents\"
              
              # Verify snapshot data was actually loaded
              if [ \"\$DOC_COUNT\" -gt 0 ]; then
                echo \"✅ Snapshot data verified - \$DOC_COUNT documents loaded\"
              else
                echo \"❌ Warning: Index is empty after snapshot import\"
                exit 1
              fi
            else
              echo '❌ Meilisearch is not running'
              exit 1
            fi
          "
      
      - name: Update Proxy Function with New IP
        run: |
          EXTERNAL_IP="${{ steps.vm-ip.outputs.vm_external_ip }}"
          echo "🔄 Updating proxy function with new Meilisearch IP: $EXTERNAL_IP"
          
          cd functions/proxy
          rm -rf node_modules
          npm cache clean --force
          npm ci
          gcloud run deploy aoe2-api-proxy \
            --source=. \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=256Mi \
            --timeout=30s \
            --set-env-vars="STEAM_API_KEY=${{ secrets.STEAM_API_KEY }},RELIC_AUTH_STEAM_USER=${{ secrets.RELIC_AUTH_STEAM_USER }},RELIC_AUTH_STEAM_PASS=${{ secrets.RELIC_AUTH_STEAM_PASS }},MEILISEARCH_HOST=http://$EXTERNAL_IP:7700,MEILISEARCH_API_KEY=${{ secrets.MEILISEARCH_API_KEY }}" \
            --service-account="aoe2-site-bot@aoe2-site.iam.gserviceaccount.com" \
            --verbosity=debug
          
          echo "✅ Proxy function updated with new Meilisearch IP" 