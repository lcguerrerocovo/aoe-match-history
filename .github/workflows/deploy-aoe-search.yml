name: Deploy AOE Search VM with Latest Snapshot

on:
  push:
    paths:
      - 'aoe-search/deploy-vm.sh'
      - 'aoe-search/startup.sh'
      - '.github/workflows/deploy-aoe-search.yml'
  workflow_dispatch:

jobs:
  deploy-aoe-search-vm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Deploy AOE Search VM
        run: |
          cd aoe-search
          chmod +x deploy-vm.sh
          MEILI_MASTER_KEY="${{ secrets.MEILISEARCH_MASTER_KEY }}" ./deploy-vm.sh
      
      - name: Get VM External IP
        id: vm-ip
        run: |
          EXTERNAL_IP=$(gcloud compute instances describe aoe-search --zone=us-central1-a --format='get(networkInterfaces[0].accessConfigs[0].natIP)' 2>/dev/null || echo "")
          if [ -n "$EXTERNAL_IP" ]; then
            echo "vm_external_ip=$EXTERNAL_IP" >> $GITHUB_OUTPUT
            echo "✅ AOE Search VM deployed at: $EXTERNAL_IP"
          else
            echo "❌ Failed to get VM external IP"
            exit 1
          fi
      
      - name: Wait for startup script to complete
        run: |
          EXTERNAL_IP="${{ steps.vm-ip.outputs.vm_external_ip }}"
          echo "⏳ Waiting for startup script to complete..."
          for i in {1..60}; do
            if curl -f "http://$EXTERNAL_IP:7700/health" > /dev/null 2>&1; then
              echo "✅ Startup script completed - Meilisearch is ready!"
              break
            fi
            echo "Waiting for startup script... (attempt $i/60)"
            sleep 10
          done
      
      - name: Get latest snapshot from GCS
        id: get-snapshot
        run: |
          # Get the latest snapshot directory
          LATEST_SNAPSHOT_DIR=$(gsutil ls gs://aoe2-site-data/snapshots/ | grep -E '[0-9]{8}-[0-9]{6}/$' | sort | tail -1 | sed 's|/$||')
          echo "Latest snapshot: $LATEST_SNAPSHOT_DIR"
          
          # Download the snapshot files to GitHub Actions runner
          mkdir -p ./latest-snapshot
          gsutil cp "${LATEST_SNAPSHOT_DIR}/data.snapshot" ./latest-snapshot/
          gsutil cp "${LATEST_SNAPSHOT_DIR}/fingerprint.txt" ./latest-snapshot/ 2>/dev/null || echo "No fingerprint found"
          gsutil cp "${LATEST_SNAPSHOT_DIR}/metadata.json" ./latest-snapshot/ 2>/dev/null || echo "No metadata found"
          
          # Set output for next steps
          echo "snapshot_dir=${LATEST_SNAPSHOT_DIR}" >> $GITHUB_OUTPUT
          echo "fingerprint=$(cat ./latest-snapshot/fingerprint.txt 2>/dev/null || echo 'none')" >> $GITHUB_OUTPUT
      

      
      - name: Upload snapshot and restart Docker
        run: |
          EXTERNAL_IP="${{ steps.vm-ip.outputs.vm_external_ip }}"
          
          # Create persistent snapshot directory on VM
          gcloud compute ssh aoe-search --zone=us-central1-a --command="sudo mkdir -p /mnt/stateful_partition/meilisearch/snapshots"
          
          # Upload snapshot files using gcloud compute scp
          gcloud compute scp --zone=us-central1-a ./latest-snapshot/* aoe-search:/tmp/
          
          # Move files to persistent storage location
          gcloud compute ssh aoe-search --zone=us-central1-a --command="
            sudo mv /tmp/data.snapshot /mnt/stateful_partition/meilisearch/snapshots/latest.snapshot
            sudo mv /tmp/fingerprint.txt /mnt/stateful_partition/meilisearch/snapshots/latest.fingerprint.txt 2>/dev/null || true
            sudo mv /tmp/metadata.json /mnt/stateful_partition/meilisearch/snapshots/latest.metadata.json 2>/dev/null || true
            sudo chown -R root:root /mnt/stateful_partition/meilisearch/snapshots/
            sudo chmod 644 /mnt/stateful_partition/meilisearch/snapshots/*
          "
          
          # Restart Docker container to load snapshot
          echo "🔄 Restarting Docker container to load snapshot..."
          gcloud compute ssh aoe-search --zone=us-central1-a --command="
            sudo docker restart meilisearch
          "
          
          echo "⏳ Waiting for Docker restart to complete..."
          sleep 10
          
          # Apply settings after snapshot is loaded
          echo "🔧 Applying index settings after snapshot load..."
          gcloud compute ssh aoe-search --zone=us-central1-a --command="
            # Wait for Meilisearch to be ready after restart
            until curl -f http://localhost:7700/health >/dev/null 2>&1; do
              echo 'Waiting for Meilisearch to be ready...'
              sleep 3
            done
            
            # Get config from VM metadata and apply settings
            MEILI_CONFIG=\$(curl -s \"http://metadata.google.internal/computeMetadata/v1/instance/attributes/meili_config\" -H \"Metadata-Flavor: Google\")
            SETTINGS_RESPONSE=\$(curl -X PATCH 'http://localhost:7700/indexes/players/settings' \\
              -H 'Authorization: Bearer ${{ secrets.MEILISEARCH_MASTER_KEY }}' \\
              -H 'Content-Type: application/json' \\
              --data-binary \"\$MEILI_CONFIG\")
            
            # Wait for settings task to complete
            SETTINGS_TASK_UID=\$(echo \"\$SETTINGS_RESPONSE\" | jq -r '.taskUid // empty')
            if [ -n \"\$SETTINGS_TASK_UID\" ]; then
              echo \"⏳ Waiting for settings to apply (task \$SETTINGS_TASK_UID)...\"
              until [ \"\$(curl -s -H \\\"Authorization: Bearer ${{ secrets.MEILISEARCH_MASTER_KEY }}\\\" http://localhost:7700/tasks/\$SETTINGS_TASK_UID | jq -r '.status')\" = \"succeeded\" ]; do
                sleep 3
              done
              echo \"✅ Settings applied successfully\"
            fi
          "
      
      - name: Verify deployment
        run: |
          echo "⏳ Waiting for VM restart and startup script to complete..."
          # Wait for VM to be accessible again
          for i in {1..60}; do
            if gcloud compute ssh aoe-search --zone=us-central1-a --command="echo 'VM is ready'" >/dev/null 2>&1; then
              echo "✅ VM is accessible"
              break
            fi
            echo "Waiting for VM to be ready... (attempt $i/60)"
            sleep 10
          done
          
          echo "⏳ Waiting for startup script and Meilisearch to be ready..."
          gcloud compute ssh aoe-search --zone=us-central1-a --command="
            # Wait for startup script to complete and Meilisearch to be healthy
            for i in {1..60}; do
              if sudo docker ps | grep -q meilisearch && curl -f http://localhost:7700/health >/dev/null 2>&1; then
                echo '✅ Meilisearch is running and healthy'
                break
              fi
              echo \"Waiting for startup script and Meilisearch... (attempt \$i/60)\"
              sleep 10
            done
            
            # Check if Meilisearch is running
            if sudo docker ps | grep -q meilisearch; then
              echo '✅ Meilisearch container is running'
              
              # Check if snapshot was loaded from persistent storage
              if [ -f '/mnt/stateful_partition/meilisearch/snapshots/latest.fingerprint.txt' ]; then
                CURRENT_FINGERPRINT=\$(cat /mnt/stateful_partition/meilisearch/snapshots/latest.fingerprint.txt)
                echo \"✅ Snapshot loaded with fingerprint: \$CURRENT_FINGERPRINT\"
              else
                echo '⚠️ No fingerprint file found'
              fi
              
              # Get document count and verify configuration
              DOC_COUNT=\$(curl -s -H \"Authorization: Bearer ${{ secrets.MEILISEARCH_MASTER_KEY }}\" http://localhost:7700/indexes/players/stats | jq -r '.numberOfDocuments // 0')
              echo \"📊 Index contains \$DOC_COUNT documents\"
              
              # Check if configuration was applied
              SORTABLE_ATTRS=\$(curl -s -H \"Authorization: Bearer ${{ secrets.MEILISEARCH_MASTER_KEY }}\" http://localhost:7700/indexes/players/settings | jq -r '.sortableAttributes // []' | jq length)
              echo \"📝 Index has \$SORTABLE_ATTRS sortable attributes configured\"
              
              # Check for any pending settings tasks
              PENDING_TASKS=\$(curl -s -H \"Authorization: Bearer ${{ secrets.MEILISEARCH_MASTER_KEY }}\" http://localhost:7700/tasks | jq -r '.results[] | select(.type == \"settingsUpdate\" and .status == \"enqueued\") | .uid' | head -1)
              if [ -n \"\$PENDING_TASKS\" ]; then
                echo \"⚠️ Found pending settings task \$PENDING_TASKS - waiting for completion...\"
                until [ \"\$(curl -s -H \\\"Authorization: Bearer ${{ secrets.MEILISEARCH_MASTER_KEY }}\\\" http://localhost:7700/tasks/\$PENDING_TASKS | jq -r '.status')\" = \"succeeded\" ]; do
                  echo \"Settings task still processing...\"
                  sleep 5
                done
                echo \"✅ Settings task completed\"
                
                # Re-check settings after task completion
                SORTABLE_ATTRS=\$(curl -s -H \"Authorization: Bearer ${{ secrets.MEILISEARCH_MASTER_KEY }}\" http://localhost:7700/indexes/players/settings | jq -r '.sortableAttributes // []' | jq length)
                echo \"📝 Index now has \$SORTABLE_ATTRS sortable attributes configured\"
              fi
              
              # Verify both snapshot data and configuration
              if [ \"\$DOC_COUNT\" -gt 0 ] && [ \"\$SORTABLE_ATTRS\" -gt 0 ]; then
                echo \"✅ Deployment verified - \$DOC_COUNT documents loaded with proper configuration\"
              else
                echo \"❌ Deployment issue: documents=\$DOC_COUNT, sortable_attrs=\$SORTABLE_ATTRS\"
                exit 1
              fi
            else
              echo '❌ Meilisearch is not running'
              exit 1
            fi
          "
      
      - name: Update Proxy Function with New IP
        run: |
          EXTERNAL_IP="${{ steps.vm-ip.outputs.vm_external_ip }}"
          echo "🔄 Updating proxy function with new Meilisearch IP: $EXTERNAL_IP"
          
          cd functions/proxy
          rm -rf node_modules
          npm cache clean --force
          npm ci
          gcloud run deploy aoe2-api-proxy \
            --source=. \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=256Mi \
            --timeout=30s \
            --set-env-vars="STEAM_API_KEY=${{ secrets.STEAM_API_KEY }},RELIC_AUTH_STEAM_USER=${{ secrets.RELIC_AUTH_STEAM_USER }},RELIC_AUTH_STEAM_PASS=${{ secrets.RELIC_AUTH_STEAM_PASS }},MEILISEARCH_HOST=http://$EXTERNAL_IP:7700,MEILISEARCH_API_KEY=${{ secrets.MEILISEARCH_API_KEY }}" \
            --service-account="aoe2-site-bot@aoe2-site.iam.gserviceaccount.com" \
            --verbosity=debug
          
          echo "✅ Proxy function updated with new Meilisearch IP" 