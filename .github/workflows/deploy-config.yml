name: Deploy Meilisearch Config

on:
  push:
    paths:
      - 'aoe-search/meilisearch_config.json'
    branches:
      - main

jobs:
  deploy-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}

      - name: Get VM IP
        id: get-vm-ip
        run: |
          VM_IP=$(gcloud compute instances describe aoe-search --zone=us-central1-a --format="value(networkInterfaces[0].accessConfigs[0].natIP)" 2>/dev/null || echo "")
          if [ -z "$VM_IP" ]; then
            echo "❌ Could not get VM IP"
            exit 1
          fi
          echo "vm_ip=$VM_IP" >> $GITHUB_OUTPUT
          echo "✅ VM IP: $VM_IP"

      - name: Deploy Meilisearch Config
        run: |
          VM_IP="${{ steps.get-vm-ip.outputs.vm_ip }}"
          
          echo "📤 Uploading Meilisearch config to VM..."
          
          # Upload the config file
          gcloud compute scp \
            aoe-search/meilisearch_config.json \
            aoe-search@$VM_IP:/tmp/meilisearch_config.json \
            --zone=us-central1-a \
            --strict-host-key-checking=no
          
          if [ $? -eq 0 ]; then
            echo "✅ Config uploaded successfully"
          else
            echo "❌ Failed to upload config"
            exit 1
          fi

      - name: Apply Config Changes
        run: |
          VM_IP="${{ steps.get-vm-ip.outputs.vm_ip }}"
          
          echo "🔧 Applying Meilisearch config changes..."
          
          # Apply the config and restart Meilisearch
          gcloud compute ssh aoe-search@$VM_IP --zone=us-central1-a --command="
            set -e
            
            echo '📋 Applying new Meilisearch configuration...'
            
            # Stop Meilisearch
            sudo systemctl stop meilisearch
            
            # Backup current config
            sudo cp /etc/meilisearch/meilisearch.json /etc/meilisearch/meilisearch.json.backup.$(date +%Y%m%d-%H%M%S)
            
            # Apply new config
            sudo cp /tmp/meilisearch_config.json /etc/meilisearch/meilisearch.json
            
            # Start Meilisearch
            sudo systemctl start meilisearch
            
            # Wait for Meilisearch to be ready
            echo '⏳ Waiting for Meilisearch to start...'
            for i in {1..30}; do
              if curl -s http://localhost:7700/health | grep -q 'available'; then
                echo '✅ Meilisearch is ready!'
                break
              fi
              if [ \$i -eq 30 ]; then
                echo '❌ Meilisearch failed to start'
                exit 1
              fi
              sleep 2
            done
            
            # Verify config was applied
            echo '🔍 Verifying configuration...'
            if curl -s http://localhost:7700/indexes/players/settings | grep -q 'alias'; then
              echo '✅ Configuration applied successfully!'
            else
              echo '❌ Configuration verification failed'
              exit 1
            fi
            
            # Clean up
            rm -f /tmp/meilisearch_config.json
          " --strict-host-key-checking=no
          
          if [ $? -eq 0 ]; then
            echo "✅ Config changes applied successfully!"
          else
            echo "❌ Failed to apply config changes"
            exit 1
          fi

      - name: Verify Deployment
        run: |
          VM_IP="${{ steps.get-vm-ip.outputs.vm_ip }}"
          
          echo "🔍 Verifying deployment..."
          
          # Wait a moment for everything to settle
          sleep 10
          
          # Check if Meilisearch is responding
          gcloud compute ssh aoe-search@$VM_IP --zone=us-central1-a --command="
            if curl -s http://localhost:7700/health | grep -q 'available'; then
              echo '✅ Meilisearch is healthy'
              
              # Test search functionality
              if curl -s 'http://localhost:7700/indexes/players/search' -H 'Content-Type: application/json' -d '{\"q\":\"test\"}' > /dev/null; then
                echo '✅ Search functionality working'
              else
                echo '❌ Search functionality not working'
                exit 1
              fi
            else
              echo '❌ Meilisearch is not healthy'
              exit 1
            fi
          " --strict-host-key-checking=no
          
          if [ $? -eq 0 ]; then
            echo "✅ Deployment verification successful!"
          else
            echo "❌ Deployment verification failed"
            exit 1
          fi 