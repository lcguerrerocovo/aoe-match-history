name: Build and Deploy UI

on:
  push:
    branches: [ master ]
    paths:
      - 'ui/**'
      - 'data/100.json'
      - 'data/rl_api_mappings.json'
      - '.github/workflows/deploy.yml'
      - 'functions/**'
      - 'meilisearch_config.json'
  pull_request:
    branches: [ master ]
    paths:
      - 'ui/**'
      - 'data/100.json'
      - 'data/rl_api_mappings.json'
      - '.github/workflows/deploy.yml'
      - 'functions/**'
      - 'meilisearch_config.json'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: node:20.11.1-slim
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y libc6 && \
          apt-get clean && rm -rf /var/lib/apt/lists/*
      
      - name: Install UI dependencies
        working-directory: ui
        run: |
          rm -f package-lock.json && \
          npm install --legacy-peer-deps --registry=https://registry.npmjs.org/ --no-audit --no-fund
      
      - name: Install Cypress dependencies
        run: |
          apt-get update && apt-get install -y \
            libgtk2.0-0 \
            libgtk-3-0 \
            libgbm-dev \
            libnotify-dev \
            libgconf-2-4 \
            libnss3 \
            libxss1 \
            libasound2 \
            libxtst6 \
            xauth \
            xvfb \
            && apt-get clean && rm -rf /var/lib/apt/lists/*
      
      - name: Install Proxy Function dependencies
        working-directory: functions/proxy
        run: npm install --legacy-peer-deps --registry=https://registry.npmjs.org/ --no-audit --no-fund
      
      - name: Lint UI
        working-directory: ui
        run: npm run lint
      
      - name: Run all tests
        working-directory: ui
        run: npm run test:all
      
      - name: Build UI
        working-directory: ui
        run: npm run build
      
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure CORS and Website
        run: |
          cat > cors.json << EOF
          [
            {
              "origin": [
                "http://localhost:4173",
                "http://localhost:5173",
                "https://aoe2-match-history-site.storage.googleapis.com",
                "https://aoe2.site",
                "https://us-central1-aoe2-site.cloudfunctions.net"
              ],
              "method": ["GET"],
              "responseHeader": ["Content-Type"],
              "maxAgeSeconds": 3600
            }
          ]
          EOF
          gsutil cors set cors.json gs://aoe2.site
          gsutil web set -m index.html -e index.html gs://aoe2.site
          rm cors.json
      
      - name: Upload Assets to GCS
        working-directory: ui
        run: |
          # Upload maps with cache headers
          if [ -d "src/assets/maps" ]; then
            gsutil -m cp -r src/assets/maps/* gs://aoe2.site/assets/maps/
            gsutil -m setmeta -h "Cache-Control:public, max-age=86400" gs://aoe2.site/assets/maps/*.png
          fi
          
          # Upload civ icons with cache headers
          if [ -d "src/assets/civ_icons" ]; then
            gsutil -m cp -r src/assets/civ_icons/* gs://aoe2.site/assets/civ_icons/
            gsutil -m setmeta -h "Cache-Control:public, max-age=86400" gs://aoe2.site/assets/civ_icons/*.png
          fi
          
          # Upload logos with cache headers
          if [ -d "src/assets/logo" ]; then
            gsutil -m cp -r src/assets/logo/* gs://aoe2.site/assets/logo/
            gsutil -m setmeta -h "Cache-Control:public, max-age=86400" gs://aoe2.site/assets/logo/*.png
          fi
      
      - name: Deploy to GCS
        run: |
          # Deploy UI build
          cp ui/dist/index.html ui/dist/404.html
          gsutil -m cp -r ui/dist/* gs://aoe2.site/
          gsutil -h "Cache-Control:no-cache,max-age=0" cp ui/dist/index.html gs://aoe2.site/
          gsutil -h "Cache-Control:no-cache,max-age=0" cp ui/dist/404.html gs://aoe2.site/
          # Deploy static data with long cache
          gsutil -m cp data/100.json gs://aoe2.site/data/
          gsutil -m cp data/rl_api_mappings.json gs://aoe2.site/data/
          gsutil -m setmeta -h "Cache-Control:public, max-age=86400" gs://aoe2.site/data/100.json gs://aoe2.site/data/rl_api_mappings.json
          # Upload _redirects file
          gsutil -m cp ui/_redirects gs://aoe2.site/_redirects
          # Set ACL for public access
          gsutil -m acl ch -r -u AllUsers:R gs://aoe2.site/assets/ gs://aoe2.site/data/ gs://aoe2.site/_redirects

  deploy-proxy-function:
    runs-on: ubuntu-latest
    container:
      image: node:20.11.1-slim
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y libc6 && \
          apt-get clean && rm -rf /var/lib/apt/lists/*
      
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Enable APIs
        run: |
          gcloud services enable cloudresourcemanager.googleapis.com
          gcloud services enable cloudfunctions.googleapis.com
          gcloud services enable cloudbuild.googleapis.com
          gcloud services enable firestore.googleapis.com
      
      - name: Create Firestore Database
        run: |
          # Create Firestore database if it doesn't exist
          gcloud firestore databases create --location=us-central1 --quiet || echo "Database already exists"
      

      
      - name: Get Meilisearch VM External IP
        run: |
          # Get the external IP of the Meilisearch VM
          EXTERNAL_IP=$(gcloud compute instances describe aoe-search --zone=us-central1-a --format='get(networkInterfaces[0].accessConfigs[0].natIP)' 2>/dev/null || echo "")
          if [ -z "$EXTERNAL_IP" ]; then
            echo "⚠️  Meilisearch VM not found. Using fallback configuration."
            echo "MEILISEARCH_HOST=" >> $GITHUB_ENV
          else
            echo "✅ Found Meilisearch VM at external IP: $EXTERNAL_IP"
            echo "MEILISEARCH_HOST=http://$EXTERNAL_IP:7700" >> $GITHUB_ENV
          fi
      
      - name: Deploy Proxy Cloud Function
        run: |
          cd functions/proxy
          rm -rf node_modules
          npm cache clean --force
          npm ci
          gcloud functions deploy aoe2-api-proxy \
            --gen2 \
            --runtime=nodejs20 \
            --region=us-central1 \
            --source=. \
            --entry-point=proxy \
            --trigger-http \
            --allow-unauthenticated \
            --memory=256MB \
            --timeout=30s \
            --set-env-vars="STEAM_API_KEY=${{ secrets.STEAM_API_KEY }},RELIC_AUTH_STEAM_USER=${{ secrets.RELIC_AUTH_STEAM_USER }},RELIC_AUTH_STEAM_PASS=${{ secrets.RELIC_AUTH_STEAM_PASS }},MEILISEARCH_HOST=${{ env.MEILISEARCH_HOST }},MEILISEARCH_API_KEY=${{ secrets.MEILISEARCH_API_KEY }}" \
            --service-account="aoe2-site-bot@aoe2-site.iam.gserviceaccount.com" \
            --verbosity=debug

  deploy-apm-function:
    runs-on: ubuntu-latest
    container:
      image: python:3.11-slim
    steps:
      - uses: actions/checkout@v4
      
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Enable APIs
        run: |
          gcloud services enable cloudresourcemanager.googleapis.com
          gcloud services enable cloudfunctions.googleapis.com
          gcloud services enable cloudbuild.googleapis.com
      
      - name: Deploy APM Cloud Function
        run: |
          cd functions/apm
          pip install -r requirements.txt -t .
          gcloud functions deploy aoe2-apm-processor \
            --gen2 \
            --runtime=python311 \
            --region=us-central1 \
            --source=. \
            --entry-point=apm_handler \
            --trigger-http \
            --allow-unauthenticated \
            --memory=256MB \
            --timeout=30s \
            --service-account="aoe2-site-bot@aoe2-site.iam.gserviceaccount.com" \
            --verbosity=debug

  deploy-meilisearch-config:
    runs-on: ubuntu-latest
    needs: [deploy-proxy-function]
    steps:
      - uses: actions/checkout@v4
      
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Get Meilisearch VM External IP
        run: |
          # Get the external IP of the Meilisearch VM
          EXTERNAL_IP=$(gcloud compute instances describe aoe-search --zone=us-central1-a --format='get(networkInterfaces[0].accessConfigs[0].natIP)' 2>/dev/null || echo "")
          if [ -z "$EXTERNAL_IP" ]; then
            echo "⚠️  Meilisearch VM not found. Skipping config deployment."
            echo "MEILISEARCH_HOST=" >> $GITHUB_ENV
            echo "SKIP_MEILISEARCH_CONFIG=true" >> $GITHUB_ENV
          else
            echo "✅ Found Meilisearch VM at external IP: $EXTERNAL_IP"
            echo "MEILISEARCH_HOST=http://$EXTERNAL_IP:7700" >> $GITHUB_ENV
            echo "SKIP_MEILISEARCH_CONFIG=false" >> $GITHUB_ENV
          fi
      
      - name: Deploy Meilisearch Configuration
        if: env.SKIP_MEILISEARCH_CONFIG != 'true'
        run: |
          echo "🔧 Updating Meilisearch configuration via API..."
          
          # Extract external IP from environment variable
          MEILISEARCH_HOST="${{ env.MEILISEARCH_HOST }}"
          EXTERNAL_IP=$(echo "$MEILISEARCH_HOST" | sed 's|http://||' | sed 's|:7700||')
          
          if [ -z "$EXTERNAL_IP" ]; then
            echo "❌ No external IP found, skipping Meilisearch config"
            exit 0
          fi
          
          echo "📍 Using external IP: $EXTERNAL_IP"
          
          # Wait for Meilisearch to be healthy
          echo "⏳ Waiting for Meilisearch to be healthy..."
          for i in {1..10}; do
            if curl -f "http://$EXTERNAL_IP:7700/health" > /dev/null 2>&1; then
              echo "✅ Meilisearch is healthy"
              break
            fi
            echo "Waiting for Meilisearch... (attempt $i/10)"
            sleep 10
          done
          
          # Update index settings via API
          echo "📝 Updating index settings..."
          curl -X PATCH "http://$EXTERNAL_IP:7700/indexes/players/settings" \
            -H "Authorization: Bearer ${{ secrets.MEILISEARCH_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data-binary @meilisearch_config.json
          
          echo "✅ Meilisearch configuration updated successfully"

  clear-cloudflare-cache:
    runs-on: ubuntu-latest
    needs: [deploy-proxy-function]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to check what changed
      
      - name: Determine what changed
        id: changes
        run: |
          # Get list of changed files since last deployment
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD || echo "")
          
          # Check for proxy function changes
          if echo "$CHANGED_FILES" | grep -q "^functions/proxy/"; then
            echo "proxy_changed=true" >> $GITHUB_OUTPUT
            echo "🔧 Proxy function changed"
          else
            echo "proxy_changed=false" >> $GITHUB_OUTPUT
            echo "🔧 No proxy function changes"
          fi
      
      - name: Clear Cloudflare Cache
        if: steps.changes.outputs.proxy_changed == 'true'
        run: |
          echo "🧹 Clearing Cloudflare cache for updated proxy function..."
          
          # Cloudflare API token should be stored in secrets
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "⚠️  CLOUDFLARE_API_TOKEN not set, skipping cache clear"
            exit 0
          fi
          
          # Zone ID for aoe2.site
          ZONE_ID="${{ secrets.CLOUDFLARE_ZONE_ID }}"
          
          if [ -z "$ZONE_ID" ]; then
            echo "⚠️  CLOUDFLARE_ZONE_ID not set, skipping cache clear"
            exit 0
          fi
          
          # Clear cache for proxy function
          echo "📝 Clearing cache for proxy function..."
          curl -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files": ["https://us-central1-aoe2-site.cloudfunctions.net/aoe2-api-proxy"]}'
          
          echo "✅ Cloudflare cache cleared successfully"
      
      - name: Update Cloudflare DNS
        run: |
          echo "🌐 Updating Cloudflare DNS for new region..."
          
          # Cloudflare API token should be stored in secrets
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "⚠️  CLOUDFLARE_API_TOKEN not set, skipping DNS update"
            exit 0
          fi
          
          # Zone ID for aoe2.site
          ZONE_ID="${{ secrets.CLOUDFLARE_ZONE_ID }}"
          
          if [ -z "$ZONE_ID" ]; then
            echo "⚠️  CLOUDFLARE_ZONE_ID not set, skipping DNS update"
            exit 0
          fi
          
          # Get the current DNS record ID for api.aoe2.site
          echo "📝 Getting current DNS record..."
          RECORD_RESPONSE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=api.aoe2.site" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json")
          
          RECORD_ID=$(echo "$RECORD_RESPONSE" | jq -r '.result[0].id // empty')
          
          if [ -z "$RECORD_ID" ] || [ "$RECORD_ID" = "null" ]; then
            echo "⚠️  No existing DNS record found for api.aoe2.site, creating new one..."
            
            # Create new CNAME record
            curl -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data '{
                "type": "CNAME",
                "name": "api",
                "content": "aoe2-api-proxy-w23c4qxc5a-uc.a.run.app",
                "proxied": true
              }'
          else
            echo "📝 Updating existing DNS record..."
            
            # Update existing CNAME record
            curl -X PUT "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data '{
                "type": "CNAME",
                "name": "api",
                "content": "aoe2-api-proxy-w23c4qxc5a-uc.a.run.app",
                "proxied": true
              }'
          fi
          
          echo "✅ Cloudflare DNS updated successfully"