name: Build and Deploy UI

on:
  push:
    branches: [ master ]
    paths:
      - 'ui/**'
      - 'data/100.json'
      - 'data/rl_api_mappings.json'
      - '.github/workflows/deploy.yml'
      - 'functions/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'ui/**'
      - 'data/100.json'
      - 'data/rl_api_mappings.json'
      - '.github/workflows/deploy.yml'
      - 'functions/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: node:20.11.1-slim
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y libc6 && \
          apt-get clean && rm -rf /var/lib/apt/lists/*
      
      - name: Install UI dependencies
        working-directory: ui
        run: |
          rm -f package-lock.json && \
          npm install --legacy-peer-deps --registry=https://registry.npmjs.org/ --no-audit --no-fund
      
      - name: Lint UI
        working-directory: ui
        run: npm run lint
      
      - name: Run all tests
        working-directory: ui
        run: npm run test:all
      
      - name: Build UI
        working-directory: ui
        run: npm run build
      
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure CORS and Website
        run: |
          cat > cors.json << EOF
          [
            {
              "origin": [
                "http://localhost:4173",
                "http://localhost:5173",
                "https://aoe2-match-history-site.storage.googleapis.com",
                "https://aoe2.site",
                "https://us-east1-aoe2-site.cloudfunctions.net"
              ],
              "method": ["GET"],
              "responseHeader": ["Content-Type"],
              "maxAgeSeconds": 3600
            }
          ]
          EOF
          gsutil cors set cors.json gs://aoe2.site
          gsutil web set -m index.html -e index.html gs://aoe2.site
          rm cors.json
      
      - name: Deploy to GCS
        run: |
          # Deploy UI build
          cp ui/dist/index.html ui/dist/404.html
          gsutil -m cp -r ui/dist/* gs://aoe2.site/
          gsutil -h "Cache-Control:no-cache,max-age=0" cp ui/dist/index.html gs://aoe2.site/
          gsutil -h "Cache-Control:no-cache,max-age=0" cp ui/dist/404.html gs://aoe2.site/
          # Deploy static data with long cache
          gsutil -m cp data/100.json gs://aoe2.site/data/
          gsutil -m cp data/rl_api_mappings.json gs://aoe2.site/data/
          gsutil -m setmeta -h "Cache-Control:public, max-age=86400" gs://aoe2.site/data/100.json gs://aoe2.site/data/rl_api_mappings.json
          # Upload _redirects file
          gsutil -m cp ui/_redirects gs://aoe2.site/_redirects
          # Set ACL for public access
          gsutil -m acl ch -r -u AllUsers:R gs://aoe2.site/assets/ gs://aoe2.site/data/ gs://aoe2.site/_redirects

  deploy-function:
    runs-on: ubuntu-latest
    container:
      image: node:20.11.1-slim
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y libc6 && \
          apt-get clean && rm -rf /var/lib/apt/lists/*
      
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Enable APIs
        run: |
          gcloud services enable cloudresourcemanager.googleapis.com
          gcloud services enable cloudfunctions.googleapis.com
          gcloud services enable cloudbuild.googleapis.com
      
      - name: Deploy Cloud Function
        run: |
          cd functions/proxy
          rm -rf node_modules
          npm cache clean --force
          npm ci
          gcloud functions deploy aoe2-api-proxy \
            --gen2 \
            --runtime=nodejs20 \
            --region=us-east1 \
            --source=. \
            --entry-point=proxy \
            --trigger-http \
            --allow-unauthenticated \
            --memory=256MB \
            --timeout=30s \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars="STEAM_API_KEY=${{ secrets.STEAM_API_KEY }}" \
            --verbosity=debug 