name: Build and Deploy UI

on:
  push:
    branches: [ master ]
    paths:
      - 'ui/**'
      - 'data/100.json'
      - 'data/rl_api_mappings.json'
      - '.github/workflows/deploy.yml'
      - 'functions/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'ui/**'
      - 'data/100.json'
      - 'data/rl_api_mappings.json'
      - '.github/workflows/deploy.yml'
      - 'functions/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: node:20.19.0-slim
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: |
            ui/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      
      - name: Install UI dependencies
        working-directory: ui
        run: |
          npm ci --legacy-peer-deps --registry=https://registry.npmjs.org/ --no-audit --no-fund
          # Fix Rollup optional dependencies issue
          npm rebuild rollup
          # Ensure all optional dependencies are properly installed
          npm install --no-save rollup
      
      - name: Cache Cypress dependencies
        uses: actions/cache@v3
        with:
          path: |
            /var/cache/apt/archives
            ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cypress-
      
      - name: Install Cypress dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            libgtk2.0-0 \
            libgtk-3-0 \
            libgbm-dev \
            libnotify-dev \
            libgconf-2-4 \
            libnss3 \
            libxss1 \
            libasound2 \
            libxtst6 \
            xauth \
            xvfb \
            && apt-get clean && rm -rf /var/lib/apt/lists/*
      
      - name: Cache Proxy Function dependencies
        uses: actions/cache@v3
        with:
          path: functions/proxy/node_modules
          key: ${{ runner.os }}-proxy-node-${{ hashFiles('functions/proxy/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-proxy-node-
      
      - name: Install Proxy Function dependencies
        working-directory: functions/proxy
        run: npm ci --legacy-peer-deps --registry=https://registry.npmjs.org/ --no-audit --no-fund
      
      - name: Lint UI
        working-directory: ui
        run: npm run lint
      
      - name: Cache build output
        uses: actions/cache@v3
        with:
          path: ui/dist
          key: ${{ runner.os }}-build-${{ hashFiles('ui/src/**/*') }}-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-
      
      - name: Run all tests in parallel
        run: |
          # Run UI tests (Vitest and Cypress) and proxy function tests in parallel
          cd ui && npm run test:ci &
          cd ui && npm run cy:run:ci &
          cd functions/proxy && npm test &
          wait
      
      - name: Build UI
        working-directory: ui
        run: npm run build
      
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure CORS and Website
        run: |
          cat > cors.json << EOF
          [
            {
              "origin": [
                "http://localhost:4173",
                "http://localhost:5173",
                "https://aoe2-match-history-site.storage.googleapis.com",
                "https://aoe2.site",
                "https://us-central1-aoe2-site.cloudfunctions.net"
              ],
              "method": ["GET"],
              "responseHeader": ["Content-Type"],
              "maxAgeSeconds": 3600
            }
          ]
          EOF
          gsutil cors set cors.json gs://aoe2.site
          gsutil web set -m index.html -e index.html gs://aoe2.site
          rm cors.json
      
      - name: Upload Assets to GCS
        working-directory: ui
        run: |
          # Upload maps with cache headers
          if [ -d "src/assets/maps" ]; then
            gsutil -m cp -r src/assets/maps/* gs://aoe2.site/assets/maps/
            gsutil -m setmeta -h "Cache-Control:public, max-age=86400" gs://aoe2.site/assets/maps/*.png
          fi
          
          # Upload civ icons with cache headers
          if [ -d "src/assets/civ_icons" ]; then
            gsutil -m cp -r src/assets/civ_icons/* gs://aoe2.site/assets/civ_icons/
            gsutil -m setmeta -h "Cache-Control:public, max-age=86400" gs://aoe2.site/assets/civ_icons/*.png
          fi

          # Upload civ emblems (full heraldic crests) with cache headers
          if [ -d "src/assets/civ_emblems" ]; then
            gsutil -m cp -r src/assets/civ_emblems/* gs://aoe2.site/assets/civ_emblems/
            gsutil -m setmeta -h "Cache-Control:public, max-age=86400" gs://aoe2.site/assets/civ_emblems/*.png
          fi
          
          # Upload logos with cache headers
          if [ -d "src/assets/logo" ]; then
            gsutil -m cp -r src/assets/logo/* gs://aoe2.site/assets/logo/
            gsutil -m setmeta -h "Cache-Control:public, max-age=86400" gs://aoe2.site/assets/logo/*.png
          fi
      
      - name: Deploy to GCS
        run: |
          # Deploy UI build
          cp ui/dist/index.html ui/dist/404.html
          gsutil -m cp -r ui/dist/* gs://aoe2.site/
          gsutil -h "Cache-Control:no-cache,max-age=0" cp ui/dist/index.html gs://aoe2.site/
          gsutil -h "Cache-Control:no-cache,max-age=0" cp ui/dist/404.html gs://aoe2.site/
          # Deploy static data with long cache
          gsutil -m cp data/100.json gs://aoe2.site/data/
          gsutil -m cp data/rl_api_mappings.json gs://aoe2.site/data/
          gsutil -m setmeta -h "Cache-Control:public, max-age=86400" gs://aoe2.site/data/100.json gs://aoe2.site/data/rl_api_mappings.json
          # Upload _redirects file
          gsutil -m cp ui/_redirects gs://aoe2.site/_redirects
          # Set ACL for public access
          gsutil -m acl ch -r -u AllUsers:R gs://aoe2.site/assets/ gs://aoe2.site/data/ gs://aoe2.site/_redirects



  deploy-proxy-function:
    runs-on: ubuntu-latest
    container:
      image: node:20.19.0-slim
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y libc6 && \
          apt-get clean && rm -rf /var/lib/apt/lists/*
      
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Enable APIs
        run: |
          gcloud services enable cloudresourcemanager.googleapis.com
          gcloud services enable run.googleapis.com
          gcloud services enable cloudbuild.googleapis.com
          gcloud services enable firestore.googleapis.com
      
      - name: Create Firestore Database
        run: |
          # Create Firestore database if it doesn't exist
          gcloud firestore databases create --location=us-central1 --quiet || echo "Database already exists"
      

      
      - name: Get VM External IPs
        run: |
          # Meilisearch VM
          MEILI_IP=$(gcloud compute instances describe aoe-search --zone=us-central1-a --format='get(networkInterfaces[0].accessConfigs[0].natIP)' 2>/dev/null || echo "")
          if [ -z "$MEILI_IP" ]; then
            echo "⚠️  Meilisearch VM not found. Using fallback configuration."
            echo "MEILISEARCH_HOST=" >> $GITHUB_ENV
          else
            echo "✅ Found Meilisearch VM at external IP: $MEILI_IP"
            echo "MEILISEARCH_HOST=http://$MEILI_IP:7700" >> $GITHUB_ENV
          fi
          # PostgreSQL VM
          PG_IP=$(gcloud compute instances describe aoe-match-db --zone=us-central1-a --format='get(networkInterfaces[0].accessConfigs[0].natIP)' 2>/dev/null || echo "")
          if [ -z "$PG_IP" ]; then
            echo "⚠️  PostgreSQL VM not found."
            echo "MATCH_DB_HOST=" >> $GITHUB_ENV
          else
            echo "✅ Found PostgreSQL VM at external IP: $PG_IP"
            echo "MATCH_DB_HOST=$PG_IP" >> $GITHUB_ENV
          fi

      - name: Deploy Proxy Cloud Run Service
        run: |
          cd functions/proxy
          rm -rf node_modules
          npm cache clean --force
          npm ci
          gcloud run deploy aoe2-api-proxy \
            --source=. \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=256Mi \
            --timeout=30s \
            --set-env-vars="STEAM_API_KEY=${{ secrets.STEAM_API_KEY }},RELIC_AUTH_STEAM_USER=${{ secrets.RELIC_AUTH_STEAM_USER }},RELIC_AUTH_STEAM_PASS=${{ secrets.RELIC_AUTH_STEAM_PASS }},MEILISEARCH_HOST=${{ env.MEILISEARCH_HOST }},MEILISEARCH_API_KEY=${{ secrets.MEILISEARCH_API_KEY }},DATABASE_URL=postgresql://collector:${{ secrets.MATCH_DB_PASSWORD }}@${{ env.MATCH_DB_HOST }}:5432/aoe2_matches" \
            --service-account="aoe2-site-bot@aoe2-site.iam.gserviceaccount.com" \
            --verbosity=debug

  deploy-apm-function:
    runs-on: ubuntu-latest
    container:
      image: python:3.11-slim
    steps:
      - uses: actions/checkout@v4
      
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Enable APIs
        run: |
          gcloud services enable cloudresourcemanager.googleapis.com
          gcloud services enable cloudfunctions.googleapis.com
          gcloud services enable cloudbuild.googleapis.com
      
      - name: Install git
        run: apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*

      - name: Run APM tests
        run: |
          cd functions/apm
          pip install -r requirements.txt -r requirements-dev.txt
          pytest test_main.py -v --tb=short

      - name: Deploy APM Cloud Function
        run: |
          cd functions/apm
          pip install -r requirements.txt -t .
          gcloud functions deploy aoe2-apm-processor \
            --gen2 \
            --runtime=python311 \
            --region=us-central1 \
            --source=. \
            --entry-point=apm_handler \
            --trigger-http \
            --allow-unauthenticated \
            --memory=256MB \
            --timeout=30s \
            --service-account="aoe2-site-bot@aoe2-site.iam.gserviceaccount.com" \
            --verbosity=debug



  clear-cloudflare-cache:
    runs-on: ubuntu-latest
    needs: [build-and-deploy, deploy-proxy-function]
    if: always() && (needs.build-and-deploy.result == 'success' || needs.deploy-proxy-function.result == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to check what changed

      - name: Determine what changed
        id: changes
        run: |
          # Get list of changed files since last deployment
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD || echo "")

          # Check for proxy function changes
          if echo "$CHANGED_FILES" | grep -q "^functions/proxy/"; then
            echo "proxy_changed=true" >> $GITHUB_OUTPUT
            echo "🔧 Proxy function changed"
          else
            echo "proxy_changed=false" >> $GITHUB_OUTPUT
          fi

          # Check for data file changes (mappings, reference data)
          if echo "$CHANGED_FILES" | grep -q "^data/"; then
            echo "data_changed=true" >> $GITHUB_OUTPUT
            echo "📊 Data files changed"
          else
            echo "data_changed=false" >> $GITHUB_OUTPUT
          fi

          # Check for asset changes (civ icons, maps, logos)
          if echo "$CHANGED_FILES" | grep -q "^ui/src/assets/"; then
            echo "assets_changed=true" >> $GITHUB_OUTPUT
            echo "🎨 Assets changed"
          else
            echo "assets_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Clear Cloudflare Cache
        if: steps.changes.outputs.proxy_changed == 'true' || steps.changes.outputs.data_changed == 'true' || steps.changes.outputs.assets_changed == 'true'
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "⚠️  CLOUDFLARE_API_TOKEN not set, skipping cache clear"
            exit 0
          fi

          ZONE_ID="${{ secrets.CLOUDFLARE_ZONE_ID }}"

          if [ -z "$ZONE_ID" ]; then
            echo "⚠️  CLOUDFLARE_ZONE_ID not set, skipping cache clear"
            exit 0
          fi

          # Build list of URLs to purge
          PURGE_FILES=""

          if [ "${{ steps.changes.outputs.proxy_changed }}" == "true" ]; then
            echo "📝 Purging proxy function cache..."
            PURGE_FILES="$PURGE_FILES\"https://us-central1-aoe2-site.cloudfunctions.net/aoe2-api-proxy\","
          fi

          if [ "${{ steps.changes.outputs.data_changed }}" == "true" ]; then
            echo "📝 Purging data files cache..."
            PURGE_FILES="$PURGE_FILES\"https://aoe2.site/data/rl_api_mappings.json\","
            PURGE_FILES="$PURGE_FILES\"https://aoe2.site/data/100.json\","
          fi

          # Remove trailing comma and wrap in JSON
          PURGE_FILES=$(echo "$PURGE_FILES" | sed 's/,$//')

          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{\"files\": [$PURGE_FILES]}"

          # For asset changes, purge the entire assets prefix
          if [ "${{ steps.changes.outputs.assets_changed }}" == "true" ]; then
            echo "📝 Purging assets cache (prefix purge)..."
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data '{"prefixes": ["https://aoe2.site/assets/"]}'
          fi

          echo "✅ Cloudflare cache cleared successfully"